name: CI/CD

on:
  push:
    branches:
      - master
    tags:
      - v*.*.*
  pull_request:
    branches:
      - master
  # Run daily at 0:01 UTC
  schedule:
    - cron:  '1 0 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.14"
    - uses: pre-commit/action@v3.0.1
      with:
        extra_args: --hook-stage manual --all-files

  test:
    runs-on: ${{ matrix.os }}
    needs: pre-commit
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macOS-latest, windows-latest]
        python-version: ["3.10", "3.14", "3.14t"]
        include:
          - python-version: "3.10"
            python-conda-pkg: "python=3.10"
          - python-version: "3.14"
            python-conda-pkg: "python=3.14"
          - python-version: "3.14t"
            python-conda-pkg: "python-freethreading=3.14"

    name: Test w/o dask client (${{ matrix.os }}) - py ${{ matrix.python-version }}

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Set up micromamba
      uses: mamba-org/setup-micromamba@v3
      with:
        micromamba-version: "2.6.0-0"
        environment-name: coffea-test
        init-shell: bash
        create-args: >-
          -c conda-forge
          ${{ matrix.python-conda-pkg }}
          pip
          uv
          pytest-xdist
          ${{ matrix.python-version != '3.14t' && 'pytorch-cpu' || '' }}
          py-xgboost
        cache-environment: true

    - name: Install coffea and dependencies (Linux)
      if: startsWith( matrix.os, 'ubuntu' )
      run: |
        if [ "${{ matrix.python-version }}" = "3.14t" ]; then
          uv pip install '.[dev,caches,parsl,dask,dask-awkward]'
        else
          uv pip install '.[dev,caches,parsl,dask,dask-awkward,triton]'
        fi
    - name: Install coffea and dependencies (macOS)
      if: matrix.os == 'macOS-latest'
      run: |
        uv pip install '.[dev,caches,dask,dask-awkward]'
    - name: Install coffea and dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        uv pip install '.[dev,caches,dask,dask-awkward]'
    - name: Start triton server with example model
      if: startsWith( matrix.os, 'ubuntu' ) && matrix.python-version != '3.14t'
      run: |
        docker run -d --rm -p 8000:8000 -p 8001:8001 -p 8002:8002 -v ${{ github.workspace }}/tests/samples/triton_models_test:/models nvcr.io/nvidia/tritonserver:25.11-pyt-python-py3 tritonserver --model-repository=/models
    - name: Test with pytest (without dask Client)
      run: |
        python -m pytest --cov-report=xml --cov=coffea --ignore=tests/test_taskvine_dask.py --ignore=tests/test_taskvine_virtual.py -m "not dask_client" -n 4
    - name: Upload codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == 3.14
      uses: codecov/codecov-action@v6
    - name: Install graphviz
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == 3.14
      uses: ts-graphviz/setup-graphviz@v2
    - name: Install pandoc
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == 3.14
      uses: r-lib/actions/setup-pandoc@v2
    - name: Build documentation
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == 3.14
      run: |
        cd docs && make html
        touch build/html/.nojekyll

  test-dask-client:
    runs-on: ${{ matrix.os }}
    needs: pre-commit
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macOS-latest, windows-latest]
        python-version: ["3.10", "3.14", "3.14t"]
        include:
          - python-version: "3.10"
            python-conda-pkg: "python=3.10"
          - python-version: "3.14"
            python-conda-pkg: "python=3.14"
          - python-version: "3.14t"
            python-conda-pkg: "python-freethreading=3.14"

    name: Test w/ dask client (${{ matrix.os }}) - py ${{ matrix.python-version }}

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Set up micromamba
      uses: mamba-org/setup-micromamba@v3
      with:
        micromamba-version: "2.6.0-0"
        environment-name: coffea-test
        init-shell: bash
        create-args: >-
          -c conda-forge
          ${{ matrix.python-conda-pkg }}
          pip
          uv
          pytest-xdist
          ${{ matrix.python-version != '3.14t' && 'pytorch-cpu' || '' }}
          py-xgboost
        cache-environment: true
    - name: Install coffea and dependencies (Linux)
      if: startsWith( matrix.os, 'ubuntu' )
      run: |
        if [ "${{ matrix.python-version }}" = "3.14t" ]; then
          uv pip install '.[dev,caches,parsl,dask,dask-awkward]'
        else
          uv pip install '.[dev,caches,parsl,dask,dask-awkward,triton]'
        fi
    - name: Install coffea and dependencies (macOS)
      if: matrix.os == 'macOS-latest'
      run: |
        uv pip install '.[dev,caches,dask,dask-awkward]'
    - name: Install coffea and dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        uv pip install '.[dev,caches,dask,dask-awkward]'
    - name: Start triton server with example model
      if: startsWith( matrix.os, 'ubuntu' ) && matrix.python-version != '3.14t'
      run: |
        docker run -d --rm -p 8000:8000 -p 8001:8001 -p 8002:8002 -v ${{ github.workspace }}/tests/samples/triton_models_test:/models nvcr.io/nvidia/tritonserver:25.11-pyt-python-py3 tritonserver --model-repository=/models
    - name: Test with pytest (with dask Client)
      run: |
        python -m pytest --cov-report=xml --cov=coffea --ignore=tests/test_taskvine_dask.py --ignore=tests/test_taskvine_virtual.py -m "dask_client" -n 4

  test-no-dask:
    runs-on: ubuntu-latest
    needs: pre-commit
    defaults:
      run:
        shell: bash -el {0}
    name: Test without dask
    steps:
    - uses: actions/checkout@v6
    - name: Set up micromamba
      uses: mamba-org/setup-micromamba@v3
      with:
        environment-name: coffea-no-dask
        init-shell: bash
        create-args: >-
          -c conda-forge
          python=3.13
          pip
          uv
          pytest-xdist
        cache-environment: true
    - name: Install coffea (no dask at all)
      run: |
        uv pip install '.[dev,caches,parsl,triton]'
    - name: Test with pytest (no dask)
      run: |
        python -m pytest --cov-report=xml --cov=coffea --ignore=tests/test_taskvine_dask.py --ignore=tests/test_taskvine_virtual.py -m "not dask_client" -n 4
    - name: Install dask and distributed (no dask-awkward)
      run: |
        uv pip install '.[dask]'
    - name: Test with pytest (dask only, no dask-awkward)
      run: |
        python -m pytest --cov-report=xml --cov=coffea --ignore=tests/test_taskvine_dask.py --ignore=tests/test_taskvine_virtual.py -m "not dask_client" -n 4

  test-vine:
    runs-on: ubuntu-latest
    needs: pre-commit
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        python-version: ["3.14"]
    name: test coffea-taskvine
    steps:
    - uses: actions/checkout@v6
    - name: Set up micromamba
      uses: mamba-org/setup-micromamba@v3
      with:
        micromamba-version: "2.6.0-0"
        environment-name: coffea-vine
        init-shell: bash
        create-args: >-
          -c conda-forge
          python=${{ matrix.python-version }}
          ndcctools
          pip
          uv
          pytest
        cache-environment: true
    - name: Install coffea
      run: |
        uv pip install '.[dask,dask-awkward]' 'dask<2025.1.0'
    - name: Test with pytest coffea with dask + taskvine
      timeout-minutes: 5
      run: |
        python -m pytest tests/test_taskvine_dask.py
    - name: Test with pytest coffea with virtual arrays + taskvine
      timeout-minutes: 5
      run: |
        python -m pytest tests/test_taskvine_virtual.py

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [test, test-no-dask, test-vine]
    permissions:
      id-token: write
      attestations: write
      contents: read
    strategy:
      matrix:
        python-version: ["3.14"]
    name: deploy release

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Build package for PyPI
      run: |
        pipx run hatch build -t sdist -t wheel
    - name: Verify the distribution
      run: pipx run twine check --strict dist/*
    - name: Generate artifact attestation for sdist and wheel
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
      with:
        subject-path: "dist/coffea-*"
    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@v1.14.0
      with:
        user: __token__
        password: ${{ secrets.PYPI_TOKEN }}

  pass:
    needs: [test, test-dask-client, test-no-dask, test-vine]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All jobs passed"
